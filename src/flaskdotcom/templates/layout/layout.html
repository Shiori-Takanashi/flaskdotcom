<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}
                List of Companies
            {% endblock title %}
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
        <style>
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            main {
                flex: 1;
            }
        </style>
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container">
                    <a class="navbar-brand" href="{{ url_for('company.company_list') }}">
                        <h3 class="display-6">
                            FlaskDotCom
                        </h2>
                    </a>
                </div>
            </nav>
        </header>

        <main>
            <div class="container py-3">
                {% block content %}
                {% endblock content %}
            </div>
        </main>

        <footer class="mt-0 py-3 bg-dark">
            <div class="container text-center">
                <p class="text-light small mb-0">
                    &copy; 2026 FlaskDotCom By Shiori Takanashi
                </p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>

</html>
